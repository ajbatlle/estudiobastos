  <script>
    const PROJECTS = [{"title": "Diseño editorial Catastro campamentos 2021", "year": "2021", "client": "TECHO Chile", "desc": "Diseño editorial del catastro nacional de campamentos de Chile. La publicación ordena datos territoriales, cartografía y testimonios en una secuencia por región, con los mapas como eje de lectura.", "imgs": ["assets/portfolio/catastro-campamentos-2021.jpg"]}, {"title": "Diseño editorial Informe 8 años Meric", "year": "2024", "client": "Centro MERIC", "desc": "Diseño editorial de la memoria por los ocho años del Centro MERIC, dedicado a la investigación en innovación en energía marina. La pieza organiza resultados, cifras y contenidos del centro en un sistema editorial impreso.", "imgs": ["assets/portfolio/informe-8-anos-meric.jpg"]}, {"title": "Coordinación de marca Fundación Vivienda", "year": "2019", "client": "Fundación Vivienda", "desc": "Gestión gráfica de la marca de Fundación Vivienda: resguardo de su uso y desarrollo de aplicaciones para piezas y publicaciones.", "imgs": ["assets/portfolio/marca-fundacion-vivienda.jpg"]}, {"title": "Diseño de identidad de marca y web Contrafactual", "year": "2018", "client": "Contrafactual", "desc": "Identidad de marca y sitio web para Contrafactual, medio digital especializado en temas económicos en Chile. El encargo abarcó el sistema visual y el diseño del sitio editorial.", "imgs": ["assets/portfolio/identidad-web-contrafactual.jpg"]}, {"title": "Diseño editorial y material de venta", "year": "2023", "client": "Aspid", "desc": "Diseño editorial de material de venta para Genesal, Tisvol y Purever, centrado en la presentación de sus productos. El encargo llegó a través de la agencia Aspid.", "imgs": ["assets/portfolio/material-de-venta.jpg"]}, {"title": "Coordinación de marca Fundación Huella Local", "year": "2024–2026", "client": "Fundación Huella Local", "desc": "Gestión gráfica de la marca de Fundación Huella Local: resguardo de su uso y desarrollo de aplicaciones y publicaciones.", "imgs": ["assets/portfolio/marca-fundacion-huella-local.jpg"]}, {"title": "Kit Concausa 2021", "year": "2021", "client": "América Solidaria", "desc": "Diseño de un kit de materiales físicos para Concausa, encuentro digital de adolescentes de América Solidaria realizado durante la pandemia, orientado a entregar herramientas de participación e incidencia. El kit reunía una libreta de diseño propio, un mazo de cartas desarrollado en equipo y otros materiales, enviados a participantes de distintos países de Latinoamérica.", "imgs": ["assets/portfolio/kit-concausa-2021.jpg"]}, {"title": "Acompañamiento escritura de cuentos, diseño y producción editorial", "year": "2025", "client": "Particular", "desc": "Acompañamiento editorial a un grupo de autoras en la escritura de cuentos biográficos. El trabajo abarcó la corrección ortotipográfica y de estilo de más de cuarenta cuentos, la organización del conjunto como libro colectivo, el diseño editorial de interior y portada, y la gestión de imprenta para una tirada de 500 ejemplares.", "imgs": ["assets/portfolio/acompanamiento-escritura-cuentos.jpg"]}, {"title": "Naming y diseño de identidad de marca Wift", "year": "2022", "client": "Wift", "desc": "Naming e identificador gráfico de Wift, startup chilena de renting de autos. Desarrollado en dupla con otro diseñador.", "imgs": ["assets/portfolio/naming-identidad-wift.png"]}];
    const modal = document.getElementById('pmodal');
    function openP(i){
      const p = PROJECTS[i];
      document.getElementById('pm-title').textContent = p.title;
      document.getElementById('pm-year').textContent = p.year;
      document.getElementById('pm-client').textContent = p.client;
      document.getElementById('pm-desc').textContent = p.desc;
      document.getElementById('pm-imgs').innerHTML = p.imgs.map(s => '<img src="'+s+'" alt="'+p.title+'">').join('');
      modal.classList.add('open'); modal.setAttribute('aria-hidden','false');
      document.body.classList.add('noscroll');
      modal.querySelector('.pmodal-panel').scrollTop = 0;
    }
    function closeP(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); document.body.classList.remove('noscroll'); }
    document.querySelectorAll('.card[data-i]').forEach(b => b.addEventListener('click', () => openP(+b.dataset.i)));
    modal.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeP));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeP(); });
  </script>
