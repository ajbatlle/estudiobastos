  .af-lead-row { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap; }

  .af-link:hover { background: #fff; color: var(--color-brand, #003ec0); }
  .af-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-top: 40px; }
  .af-tile { display: block; width: 100%; padding: 0; margin: 0; border: 0; background: none; cursor: pointer; }
  .af-tile img { display: block; width: 100%; aspect-ratio: 3 / 4; object-fit: cover; }
  .af-tile:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
  @media (max-width: 1100px) { .af-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 700px)  { .af-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }

  .af-viewer { position: fixed; inset: 0; z-index: 60; display: none; }
  .af-viewer.open { display: block; }
  .af-viewer-bg { position: absolute; inset: 0; background: rgba(10, 10, 10, 0.88); }
  .af-viewer img { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); max-width: min(88vw, 900px); max-height: 88vh; }
  .af-viewer button { position: absolute; z-index: 2; background: none; border: 0; color: #fff; cursor: pointer; font-family: inherit; padding: 12px; }
  .af-close { top: 16px; right: 20px; font-size: 34px; line-height: 1; font-weight: 300; }
  .af-prev, .af-next { top: 50%; transform: translateY(-50%); font-size: 40px; font-weight: 300; padding: 24px 18px; }
  .af-prev { left: 8px; }
  .af-next { right: 8px; }
  .af-count { position: absolute; z-index: 2; left: 50%; transform: translateX(-50%); bottom: 18px; color: rgba(255,255,255,0.75); font-size: 13px; font-variant-numeric: tabular-nums; }

  const DIR = 'assets/afichesBastos/';
  const src = (f) => DIR + encodeURIComponent(f);
  const num = (f) => { const m = f.match(/(\d+)(?:\s*\(\d+\))?\.png$/); return m ? parseInt(m[1], 10) : 0; };

  const grid = document.getElementById('afGrid');
  const frag = document.createDocumentFragment();
  NAMES.forEach((f, i) => {
    const b = document.createElement('button');
    b.className = 'af-tile';
    b.setAttribute('aria-label', 'Ver afiche nº ' + String(num(f)).padStart(3, '0'));
    const img = document.createElement('img');
    img.src = src(f);
    img.loading = 'lazy';
    img.decoding = 'async';
    img.alt = 'Afiche nº ' + String(num(f)).padStart(3, '0');
    b.appendChild(img);
    b.addEventListener('click', () => open(i));
    frag.appendChild(b);
  });
  grid.appendChild(frag);

  const viewer = document.getElementById('afViewer');
  const vImg = document.getElementById('afViewerImg');
  const vCount = document.getElementById('afCount');
  let cur = -1;

  function show(i) {
    cur = (i + NAMES.length) % NAMES.length;
    const f = NAMES[cur];
    vImg.src = src(f);
    vImg.alt = 'Afiche nº ' + String(num(f)).padStart(3, '0');
    vCount.textContent = 'nº ' + String(num(f)).padStart(3, '0') + ' — ' + (cur + 1) + ' de ' + NAMES.length;
    // precarga vecinos
    [cur - 1, cur + 1].forEach(j => { const p = new Image(); p.src = src(NAMES[(j + NAMES.length) % NAMES.length]); });
  }
  function open(i) { show(i); viewer.classList.add('open'); viewer.setAttribute('aria-hidden', 'false'); document.body.classList.add('noscroll'); }
  function close() { viewer.classList.remove('open'); viewer.setAttribute('aria-hidden', 'true'); document.body.classList.remove('noscroll'); vImg.src = ''; cur = -1; }

  viewer.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', close));
  document.getElementById('afPrev').addEventListener('click', () => show(cur - 1));
  document.getElementById('afNext').addEventListener('click', () => show(cur + 1));
  document.addEventListener('keydown', (e) => {
    if (!viewer.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft') show(cur - 1);
    else if (e.key === 'ArrowRight') show(cur + 1);
  });
})();
